<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLAZO — The FIFA 2026 Fan World</title>
    <meta name="description" content="The ultimate FIFA 2026 fan experience. Groups, fixtures, predictions, debates and more." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9682572803529145" crossorigin="anonymous"></script>
  </head>
  <body style="margin:0;background:#060A10;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <style>
      img.emoji { height: 1em; width: 1em; margin: 0 0.05em 0 0.1em; vertical-align: -0.1em; display: inline; }
    </style>
    <script>
      const observer = new MutationObserver(() => twemoji.parse(document.body, {folder:'svg', ext:'.svg'}));
      observer.observe(document.body, {childList:true, subtree:true});
    </script>
  </body>
